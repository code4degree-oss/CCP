name: Deploy AMS to VM

on:
  push:
    branches:
      - main
      - master # Triggers on master branch as well

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Execute Server Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to the project directory on the server
            cd /var/www/ams
            
            # Force pull from main to ensure the server has the latest deploy.sh
            git fetch origin
            git checkout main
            git pull origin main
            
            # Execute the deployment script
            bash deploy.sh
